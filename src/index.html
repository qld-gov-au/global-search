<!DOCTYPE html>

<html lang="en">

    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <title>Search page | Queensland Government</title>

        <link rel="stylesheet" href="https://static.qgov.net.au/qgds-bootstrap5/v2/v2.x.x-latest/assets/css/qld.bootstrap.css">
        <link rel="stylesheet" href="/dist/app.css">
    </head>

    <body data-qg-accessibility="true">
        <div id="header-container"></div>
        <div id="skiplinks-container"></div>
        <div id="navbar-container"></div>
        <div class="container default">
            <div class="row" id="breadcrumb-container"> </div>
        </div>
        <main>
            <div class="container pb-40 pb-lg-64">
                <div class="qld-content-body" id="content">

                    <div class="row">
                        <div class="col-12 col-lg-7 col-xl-7">
                            <h1>Search results</h1>
                            <!-- TypeScript Search Form -->
                            <div id="qld-search-form__container"></div>
                            <!-- End: TypeScript Search Form -->
                        </div>

                    </div>

                    <div class="row search-results-wrapper mt-32">
                        <div id="qld-search-results__container" class="col-12 col-lg-8 col-xl-7">
                            <p class="mt-3 qld-search-hint">Enter your query in the box above to search.</p>
                        </div>
                        <div class="col-12 col-lg-4 offset-xl-1">
                            <section id="qld-filter-by-results"></section>
                            <div id="qld-related-search__container" class="related-search mt-3 pt-3 pt-lg-0 mt-lg-0"></div>
                        </div>
                    </div>

                </div>
            </div>
        </main>
        <div id="footer-container"></div>

        <script type="module" src="index.js"></script>
        <script type="module" src="app.ts"></script>

        <script type="text/javascript" src="https://static.qgov.net.au/qgds-bootstrap5/v2/v2.x.x-latest/assets/js/bootstrap.min.js"></script>
        <script type="text/javascript" src="https://static.qgov.net.au/qgds-bootstrap5/v2/v2.x.x-latest/assets/js/qld.bootstrap.min.js"></script>
    </body>

</html>
